<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup Page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <h1>Signup form</h1>
    <form action="">
        <label for="fullname">enter full name:</label>
        <input type="text" id="fullname" placeholder="enter your full name" required><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="enter email" required><br>
        <label for="password">Password:</label>
        <input type="password" id="password"><br>
        <label for="confirmpasssword">confirm Password:</label>
        <input type="password" id="confirmpassword"><br><br>
        <button type="button" onclick="signup()"><a href="home.html">signup</a></button>
        <p id="signupmessage"></p>
    </form>
    <script src="signup.js"></script>
</body>
</html>
